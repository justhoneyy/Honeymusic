services:
  - type: web
    name: honey-music-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn wsgi:app --config gunicorn_config.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: honey-music-db
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
    healthCheckPath: /api/health

  - type: web
    name: honey-music-frontend
    env: static
    buildCommand: ""
    staticPublishPath: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_URL
        value: https://honey-music-backend.onrender.com

databases:
  - name: honey-music-db
    plan: free
    databaseName: honeymusic
    ipAllowList: []
