    const result = await API.getPodcast(id);
    const podcast = result.data;
    container.innerHTML = `
      <div class="playlist-header">
        <img class="playlist-header-art" src="${podcast.cover_url || ''}" alt="">
        <div class="playlist-header-info">
          <div class="playlist-type">Podcast</div>
          <h1 class="playlist-header-title">${escapeHtml(podcast.title)}</h1>
          <p class="playlist-header-desc">${escapeHtml(podcast.description || '')}</p>
          <p class="playlist-header-meta">${podcast.author || ''} • ${podcast.total_episodes || podcast.episodes?.length || 0} episodes</p>
        </div>
      </div>
      ${podcast.episodes?.length ? podcast.episodes.map(ep => `
        <div class="song-row" style="display:flex;align-items:center;padding:var(--space-md);border-bottom:1px solid var(--border-subtle);cursor:pointer" onclick="playSong(${JSON.stringify(ep).replace(/"/g,'&quot;')})">
          <div style="flex:1">
            <div style="font-weight:500">${escapeHtml(ep.title)}</div>
            <div style="font-size:0.8rem;color:var(--text-tertiary)">${ep.duration_formatted || formatTime(ep.duration)}</div>
          </div>
          <button class="player-btn" onclick="event.stopPropagation();playSong(${JSON.stringify(ep).replace(/"/g,'&quot;')})">▶</button>
        </div>
      `).join('') : '<p style="color:var(--text-tertiary)">No episodes</p>'}
    `;
  } catch (err) {
    container.innerHTML = `<div style="text-align:center;padding:var(--space-3xl);color:var(--text-tertiary)">${err.message}</div>`;
  }
}

// GENRE PAGE
async function loadGenre(slug) {
  const container = document.getElementById('page-genre');
  container.innerHTML = `<div class="loading-spinner" style="text-align:center;padding:var(--space-3xl)">Loading...</div>`;
  try {
    const result = await API.getGenre(slug);
    const genre = result.data;
    container.innerHTML = `
      <div class="playlist-header">
        <div class="playlist-header-art" style="background:${genre.color || 'var(--accent)'};display:flex;align-items:center;justify-content:center;font-size:4rem">🎵</div>
        <div class="playlist-header-info">
          <h1 class="playlist-header-title">${escapeHtml(genre.name)}</h1>
          <p class="playlist-header-meta">${genre.song_count || genre.songs?.length || 0} songs</p>
        </div>
      </div>
      ${genre.songs?.length ? renderSongList(genre.songs) : '<p style="color:var(--text-tertiary)">No songs</p>'}
    `;
  } catch (err) {
    container.innerHTML = `<div style="text-align:center;padding:var(--space-3xl);color:var(--text-tertiary)">${err.message}</div>`;
  }
}

// ============================================
// RENDER HELPERS
// ============================================
function createCard(item, type) {
  const id = item.id || '';
  const title = item.title || item.name || 'Unknown';
  const subtitle = item.artist?.name || item.artist_name || item.album?.title || (type === 'album' ? 'Album' : type === 'artist' ? 'Artist' : 'Song');
  const image = item.cover_url || item.image_url || '';
  const onClick = type === 'song' ? `playSongById('${id}')` : 
                  type === 'album' ? `Router.navigate('album',{id:'${id}'})` :
                  `Router.navigate('artist',{id:'${id}'})`;
  
  return `
    <div class="card card-sm" onclick="${onClick}">
      <div class="card-image-wrapper">
        ${image ? `<img class="card-image" src="${image}" alt="" loading="lazy">` : `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2rem">${type === 'song' ? '🎵' : type === 'album' ? '💿' : '👤'}</div>`}
        <div class="card-play-btn">▶</div>
      </div>
      <div class="card-title">${escapeHtml(title)}</div>
      <div class="card-subtitle">${escapeHtml(subtitle)}</div>
    </div>
  `;
}

function renderSongList(songs) {
  if (!songs?.length) return '<p style="color:var(--text-tertiary)">No songs</p>';
  
  return `
    <table class="song-table">
      <thead>
        <tr>
          <th style="width:40px">#</th>
          <th>Title</th>
          <th>Artist</th>
          <th style="display:none" class="album-col">Album</th>
          <th style="width:60px;text-align:right">Duration</th>
        </tr>
      </thead>
      <tbody>
        ${songs.map((s, i) => renderSongRow(s, i + 1)).join('')}
      </tbody>
    </table>
  `;
}

function renderSongRow(s, index) {
  const song = s.song || s;
  const id = song.id || '';
  const title = song.title || 'Unknown';
  const artist = song.artist?.name || 'Unknown';
  const album = song.album?.title || song.album_title || '';
  const duration = song.duration_formatted || formatTime(song.duration || 0);
  const explicit = song.explicit;
  const cover = song.cover_url || '';

  return `
    <tr class="song-row" data-song-id="${id}" onclick="playSongById('${id}')" ondblclick="playSongById('${id}')">
      <td class="song-row-index">${index}</td>
      <td>
        <div class="song-row-title">
          ${cover ? `<img src="${cover}" style="width:40px;height:40px;border-radius:4px;object-fit:cover;flex-shrink:0" alt="">` : ''}
          <span>${escapeHtml(title)}</span>
          ${explicit ? '<span class="song-row-explicit">E</span>' : ''}
        </div>
      </td>
      <td class="song-row-artist">${escapeHtml(artist)}</td>
      <td class="song-row-album album-col" style="display:none">${escapeHtml(album)}</td>
      <td class="song-row-duration">${duration}</td>
    </tr>
  `;
}

// ============================================
// PLAYLIST MANAGEMENT
// ============================================
function createPlaylistModal() {
  if (!store.get('token')) { showAuthModal(); return; }
  document.getElementById('playlist-name-input').value = '';
  document.getElementById('playlist-desc-input').value = '';
  document.getElementById('playlist-modal').classList.add('active');
}

async function handleCreatePlaylist() {
  const name = document.getElementById('playlist-name-input').value.trim();
  const desc = document.getElementById('playlist-desc-input').value.trim();
  if (!name) { showToast('Playlist name is required', 'error'); return; }
  try {
    const result = await API.createPlaylist({ name, description: desc });
    document.getElementById('playlist-modal').classList.remove('active');
    showToast('Playlist created!', 'success');
    loadSidebarPlaylists();
    Router.navigate('playlist', { id: result.data.id });
  } catch (err) {
    showToast(err.message, 'error');
  }
}

async function deletePlaylist(id) {
  try {
    await API.deletePlaylist(id);
    showToast('Playlist deleted', 'info');
    loadSidebarPlaylists();
    Router.navigate('library');
  } catch (err) {
    showToast(err.message, 'error');
  }
}

async function loadSidebarPlaylists() {
  const container = document.getElementById('sidebar-playlists');
  if (!container) return;
  try {
    const result = await API.getPlaylists();
    store.set('playlists', result.data || []);
    if (result.data?.length) {
      container.innerHTML = result.data.map(p => `
        <div class="playlist-link" onclick="Router.navigate('playlist',{id:'${p.id}'})">
          <span class="playlist-link-icon">📋</span>
          <span>${escapeHtml(p.name)}</span>
        </div>
      `).join('');
    } else {
      container.innerHTML = '<div style="font-size:0.8rem;color:var(--text-tertiary);padding:var(--space-sm)">No playlists yet</div>';
    }
  } catch {}
}

// ============================================
// PLAY ALL HELPERS
// ============================================
function playAllInContext(context, id) {
  if (context === 'album') {
    const album = store.get('currentAlbum');
    if (album?.songs?.length) {
      store.set('queue', album.songs);
      store.set('queueIndex', 0);
      playSong(album.songs[0]);
    }
  } else {
    const playlist = store.get('currentPlaylist');
    if (playlist?.songs?.length) {
      store.set('queue', playlist.songs);
      store.set('queueIndex', 0);
      playSong(playlist.songs[0]);
    }
  }
}

function playAllLiked() {
  const songs = store.get('likedSongs');
  if (songs?.length) {
    store.set('queue', songs);
    store.set('queueIndex', 0);
    playSong(songs[0]);
  }
}

// ============================================
// UTILITY FUNCTIONS
// ============================================
function formatTime(seconds) {
  if (!seconds || isNaN(seconds)) return '0:00';
  const s = Math.floor(seconds);
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================
// CHECK AUTH ON LOAD
// ============================================
async function checkAuth() {
  const token = localStorage.getItem(CONFIG.STORAGE_KEYS.TOKEN);
  if (token) {
    store.set('token', token);
    const refreshToken = localStorage.getItem(CONFIG.STORAGE_KEYS.REFRESH_TOKEN);
    if (refreshToken) store.set('refreshToken', refreshToken);
    
    const userData = localStorage.getItem(CONFIG.STORAGE_KEYS.USER);
    if (userData) {
      try {
        store.set('user', JSON.parse(userData));
      } catch {}
    }

    // Verify token is still valid
    try {
      const result = await API.getMe();
      if (result.data) {
        store.set('user', result.data);
        localStorage.setItem(CONFIG.STORAGE_KEYS.USER, JSON.stringify(result.data));
      }
    } catch {
      // Token invalid, clear
      store.set('token', null);
      store.set('refreshToken', null);
      store.set('user', null);
      localStorage.removeItem(CONFIG.STORAGE_KEYS.TOKEN);
      localStorage.removeItem(CONFIG.STORAGE_KEYS.REFRESH_TOKEN);
      localStorage.removeItem(CONFIG.STORAGE_KEYS.USER);
    }
  }
}

// ============================================
// PWA SERVICE WORKER
// ============================================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ============================================
// BOOTSTRAP APP
// ============================================
async function bootstrap() {
  await checkAuth();
  renderApp();
}

bootstrap().catch(console.error);
</script>
